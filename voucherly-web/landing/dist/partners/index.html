<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Partners Local</title>
		<style>
			body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 24px; }
			.card { max-width: 720px; padding: 20px; border: 1px solid #e5e7eb; border-radius: 12px; }
			.muted { color: #6b7280; }
			.row { margin: 8px 0; }
			code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
			a { color: #2563eb; text-decoration: none; margin-right: 12px; }
		</style>
	</head>
	<body>
		<div class="card">
			<h1 id="title">Partners (Local)</h1>
			<p class="muted">Testing partners routes with refresh support.</p>
			<div class="row">Path: <code id="path"></code></div>
			<div class="row">
				<a href="/partners">Partners Login</a>
				<a href="/partners/dashboard">Partners Dashboard</a>
				<a href="/">Back to Landing</a>
			</div>
		</div>
		<script>
			const path = window.location.pathname;
			document.getElementById('path').textContent = path;
			if (path === '/partners/dashboard') {
				document.getElementById('title').textContent = 'Partners Dashboard (Local)';
			} else {
				document.getElementById('title').textContent = 'Partners Login (Local)';
			}
		</script>
	</body>
</html>
