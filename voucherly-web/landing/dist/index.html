<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Voucherly Local</title>
		<style>
			body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 24px; }
			.card { max-width: 720px; padding: 20px; border: 1px solid #e5e7eb; border-radius: 12px; }
			.muted { color: #6b7280; }
			.row { margin: 8px 0; }
			code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
			a { color: #2563eb; text-decoration: none; margin-right: 12px; }
		</style>
	</head>
	<body>
		<div class="card">
			<h1 id="title">Voucherly Local</h1>
			<p class="muted">Testing routes for landing and gift page.</p>
			<div class="row">Path: <code id="path"></code></div>
			<div class="row">Query orderId: <code id="orderId"></code></div>
			<div class="row">
				<a href="/">Home</a>
				<a href="/giftpage?orderId=TEST-123">Gift Page</a>
				<a href="/partners">Partners</a>
				<a href="/partners/dashboard">Partners Dashboard</a>
			</div>
		</div>
		<script>
			const path = window.location.pathname;
			const orderId = new URLSearchParams(window.location.search).get('orderId') || '-';
			document.getElementById('path').textContent = path;
			document.getElementById('orderId').textContent = orderId;

			if (path === '/giftpage') {
				document.getElementById('title').textContent = 'Gift Page (Local)';
			} else {
				document.getElementById('title').textContent = 'Landing Page (Local)';
			}
		</script>
	</body>
</html>
